name: Autonomous Racket Factory 3-Hour Service

on:
  schedule:
    # Quota-safe cadence: twice daily.  The Odds API tennis odds/scores quota
    # is limited; 3-hour autoruns burn calls quickly during active tournaments.
    # 05:00/17:00 UTC = 07:00/19:00 Africa/Johannesburg.
    - cron: '0 5,17 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Execution mode'
        required: false
        default: 'auto'
        type: choice
        options:
          - auto             # smart schedule: morning heavy OR intraday discovery
          - official_morning # force a full morning re-pick (overwrites baseline)
          - intraday_only    # re-mine + emit picks without heavy historical capture

jobs:
  run-autonomous-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      # Optional — pipeline degrades gracefully if any are unset.
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      CALLMEBOT_APIKEY: ${{ secrets.CALLMEBOT_APIKEY }}
      CALLMEBOT_PHONE: ${{ secrets.CALLMEBOT_PHONE }}

      # The Odds API live pricing. Secrets are never printed.
      # THE_ODDS_API_KEYS supports rotation: key1,key2,key3,key4
      THE_ODDS_API_KEY: ${{ secrets.THE_ODDS_API_KEY }}
      THE_ODDS_API_KEYS: ${{ secrets.THE_ODDS_API_KEYS }}
      THE_ODDS_API_SPORT_KEYS: tennis_atp_wimbledon,tennis_wta_wimbledon
      THE_ODDS_API_SPORTS: tennis_atp_wimbledon,tennis_wta_wimbledon
      THE_ODDS_API_REGIONS: uk,eu,us,au
      THE_ODDS_API_CACHE_TTL_MINUTES: '30'
      THE_ODDS_API_DISABLE_CACHE: '0'
      # Scores endpoint costs quota on every run. CI focuses on pick generation;
      # score/result refresh can be run manually/local when needed.
      RACKET_FACTORY_DISABLE_THEODDSAPI_SCORES: '1'

      # Keep OddsPortal browser scraping opt-in on CI.
      RACKET_FACTORY_REFRESH_ODDSPORTAL: '0'
      RACKET_FACTORY_ODDSPORTAL_DELAY: '60'

      # Forecast hygiene defaults.
      RACKET_FACTORY_FORECAST_MAX_ROWS: '20'
      RACKET_FACTORY_FORECAST_MIN_EV: '0.05'
      RACKET_FACTORY_FORECAST_MIN_CONF: '60'
      RACKET_FACTORY_FORECAST_INCLUDE_NO_ODDS: '0'
      RACKET_FACTORY_FORECAST_INCLUDE_SKIPPED: '0'

      # Keep CI on the operator's wall clock so the morning/intraday split and
      # the same-day pick filter behave exactly like a local run.
      TZ: 'Africa/Johannesburg'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install supabase

      - name: Restore localdata state (cache)
        uses: actions/cache/restore@v4
        with:
          path: localdata
          key: localdata-main-${{ github.run_id }}
          restore-keys: |
            localdata-main-

      - name: Restore committed data (override stale cache)
        # Committed files under localdata/ (registries + committed history)
        # survive cache eviction, but actions/cache/restore unpacks localdata/
        # AFTER checkout and can overwrite them with stale copies. Re-check out
        # every git-tracked localdata file from HEAD so live versions win.
        run: |
          set -e
          mkdir -p localdata
          for f in $(git ls-files localdata/); do
            git checkout HEAD -- "$f" && echo "restored committed: $f"
          done

      - name: Execute autonomous smart schedule
        run: |
          MODE='${{ github.event.inputs.mode }}'
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "$MODE" ] && [ "$MODE" != "auto" ]; then
            echo ">>> Manual mode: $MODE"
            if [ "$MODE" = "official_morning" ]; then
              PYTHONPATH=src python3 scripts/daily.py --force-repick --future-days 1
            elif [ "$MODE" = "intraday_only" ]; then
              PYTHONPATH=src python3 scripts/daily.py --intraday-only --future-days 1
            fi
          else
            # Exactly one autonomous iteration of the smart accumulating ledger.
            PYTHONPATH=src python3 scripts/daily.py --auto-once --future-days 1
          fi

      - name: Persist localdata state (cache)
        uses: actions/cache/save@v4
        if: always()
        with:
          path: localdata
          key: localdata-main-${{ github.run_id }}

      - name: Upload pick ledgers & reports as artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: RacketFactory-Reports
          path: |
            localdata/*.txt
            localdata/*.json
            localdata/*.md
          retention-days: 14
          if-no-files-found: ignore
